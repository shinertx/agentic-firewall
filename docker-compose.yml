services:
  # ── Redis ──────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: agentic-firewall-redis
    restart: unless-stopped
    volumes:
      - redis-data:/data
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy noeviction
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      start_period: 3s
      retries: 3
    logging:
      driver: "json-file"
      options:
        max-size: "5m"
        max-file: "3"

  # ── Core Proxy Server ──────────────────────────────────────
  proxy:
    build:
      context: ./agent-proxy
      dockerfile: Dockerfile
    container_name: agentic-firewall-proxy
    restart: unless-stopped
    ports:
      - "4000:4000"
    environment:
      - PORT=4000
      - BIND_HOST=0.0.0.0
      - REDIS_URL=redis://redis:6379
    volumes:
      - proxy-data:/app/data
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "node -e \"require('http').get('http://localhost:4000/api/stats',r=>{r.statusCode===200?process.exit(0):process.exit(1)}).on('error',()=>process.exit(1))\""]
      interval: 10s
      timeout: 5s
      start_period: 5s
      retries: 3
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "5"

  # ── Dashboard ───────────────────────────────────────────────
  dashboard:
    build:
      context: ./agent-dashboard
      dockerfile: Dockerfile
    container_name: agentic-firewall-dashboard
    restart: unless-stopped
    ports:
      - "5173:80"
    depends_on:
      proxy:
        condition: service_healthy
    logging:
      driver: "json-file"
      options:
        max-size: "5m"
        max-file: "3"

  # ── Staging Proxy (same image, different port + env) ────────
  proxy-staging:
    build:
      context: ./agent-proxy
      dockerfile: Dockerfile
    container_name: agentic-firewall-proxy-staging
    restart: unless-stopped
    ports:
      - "4001:4000"
    environment:
      - PORT=4000
      - BIND_HOST=0.0.0.0
      - REDIS_URL=redis://redis:6379
    volumes:
      - proxy-staging-data:/app/data
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "node -e \"require('http').get('http://localhost:4000/api/stats',r=>{r.statusCode===200?process.exit(0):process.exit(1)}).on('error',()=>process.exit(1))\""]
      interval: 10s
      timeout: 5s
      start_period: 5s
      retries: 3
    logging:
      driver: "json-file"
      options:
        max-size: "5m"
        max-file: "3"
    profiles:
      - staging

volumes:
  proxy-data:
  proxy-staging-data:
  redis-data:
