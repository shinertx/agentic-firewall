name: Publish to npm

on:
  release:
    types: [published]

jobs:
  publish:
    name: Publish agent-firewall to npm
    runs-on: ubuntu-latest

    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org

      - name: Install proxy dependencies & run tests
        working-directory: agent-proxy
        run: |
          npm ci
          npm test

      - name: Install CLI dependencies
        working-directory: agent-cli
        run: npm ci

      - name: Publish to npm
        working-directory: agent-cli
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
