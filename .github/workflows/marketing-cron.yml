name: Marketing Swarm
on:
  schedule:
    - cron: '0 */6 * * *'  # Every 6 hours
  workflow_dispatch:  # Manual trigger

jobs:
  run-swarm:
    runs-on: ubuntu-latest
    steps:
      - name: Run marketing swarm on VM
        uses: appleboy/ssh-action@v1
        with:
          host: 34.55.255.155
          username: benjijmac
          key: ${{ secrets.VM_SSH_KEY }}
          script: |
            cd /home/benjijmac/agentic-firewall/agent-marketing
            pip3 install -q praw python-dotenv requests openai 2>/dev/null
            timeout 300 python3 agents/orchestrator.py --single-cycle 2>&1 || true
            echo "✅ Marketing cycle complete"
