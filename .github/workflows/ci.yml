name: CI / CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-cd-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── Test ─────────────────────────────────────────────────
  test:
    name: Test (Node ${{ matrix.node-version }})
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [20, 22]

    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm
          cache-dependency-path: agent-proxy/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: agent-proxy

      - name: Run tests
        run: npm test
        working-directory: agent-proxy

  # ── Deploy to Production (only on merge to main) ────────
  deploy:
    name: Deploy to Production
    needs: test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - uses: actions/checkout@v4

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VM_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          echo "${{ secrets.VM_HOST_KEY }}" >> ~/.ssh/known_hosts

      - name: Deploy via Docker Compose
        run: |
          ssh -i ~/.ssh/deploy_key benjijmac@34.55.255.155 << 'DEPLOY'
            set -euo pipefail
            cd ~/agentic-firewall

            # Preserve runtime data files across deploys
            for f in agent-proxy/stats.json agent-proxy/users.json agent-proxy/installs.json; do
              [ -f "$f" ] && cp "$f" "/tmp/$(basename $f)" || true
            done

            # Force-sync with remote (handles dirty working tree)
            git fetch origin main
            git reset --hard origin/main
            DEPLOY_COMMIT="$(git rev-parse --short HEAD)"
            echo "Deploying commit ${DEPLOY_COMMIT}"

            REMAINING_DRIFT="$(git status --short)"
            if [ -n "${REMAINING_DRIFT}" ]; then
              echo "⚠️ Repo still has local drift after reset:"
              echo "${REMAINING_DRIFT}"
            fi

            # Restore runtime data files
            for f in stats.json users.json installs.json; do
              [ -f "/tmp/$f" ] && cp "/tmp/$f" "agent-proxy/$f" || true
            done

            # Stop PM2 if running (legacy non-Docker setup)
            pm2 stop all 2>/dev/null || true
            pm2 delete all 2>/dev/null || true

            # Tear down existing containers and free ports
            docker compose down --remove-orphans 2>/dev/null || true
            sudo lsof -ti:4000 | xargs -r sudo kill -9 2>/dev/null || true
            sleep 2

            # Build and start only the proxy first (dashboard depends on it)
            docker compose build
            docker compose up -d proxy

            # Wait for proxy to be healthy (up to 90s)
            echo "Waiting for proxy health check..."
            for i in $(seq 1 18); do
              if curl -sf http://localhost:4000/api/stats > /dev/null 2>&1; then
                echo "✅ Proxy healthy after ${i}x5s"
                break
              fi
              if [ "$i" = "18" ]; then
                echo "❌ Proxy failed to start!"
                echo "--- Container status ---"
                docker compose ps
                echo "--- Proxy logs ---"
                docker compose logs --tail=50 proxy
                exit 1
              fi
              sleep 5
            done

            # Now start dashboard
            docker compose up -d dashboard

            echo "✅ Production deployment verified"
          DEPLOY

      - name: Verify external endpoint
        run: |
          sleep 5
          curl -sf https://api.jockeyvc.com/api/stats > /dev/null
          echo "✅ External endpoint verified"

  # ── Publish CLI to npm (only on merge to main) ────────
  publish:
    name: Publish vibe-billing to npm
    needs: [test, deploy]
    runs-on: ubuntu-latest
    if: >-
      github.ref == 'refs/heads/main' &&
      github.event_name == 'push' &&
      !contains(github.event.head_commit.message, '[skip ci]')

    permissions:
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org

      - name: Bump patch version from npm
        working-directory: agent-cli
        run: |
          REPO_VERSION=$(node -p "require('./package.json').version")
          PUBLISHED_VERSION=$(npm view vibe-billing version 2>/dev/null || echo "${REPO_VERSION}")
          NEXT_VERSION=$(node -e "const [repo, published] = process.argv.slice(1); const parse = (v) => v.split('.').map(Number); const cmp = (a, b) => { for (let i = 0; i < 3; i += 1) { if (a[i] !== b[i]) return a[i] - b[i]; } return 0; }; const base = cmp(parse(repo), parse(published)) > 0 ? repo : published; const next = parse(base); next[2] += 1; console.log(next.join('.'));" "${REPO_VERSION}" "${PUBLISHED_VERSION}")
          npm version "${NEXT_VERSION}" --no-git-tag-version
          echo "NEW_VERSION=v${NEXT_VERSION}" >> $GITHUB_ENV

      - name: Sync VERSION const in CLI
        working-directory: agent-cli
        run: |
          VER="${NEW_VERSION#v}"
          sed -i "s/^const VERSION = '.*';$/const VERSION = '${VER}';/" bin/cli.js

      - name: Publish to npm with provenance
        working-directory: agent-cli
        run: npm publish --access public --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
