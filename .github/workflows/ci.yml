name: CI / CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ── Test ─────────────────────────────────────────────────
  test:
    name: Test (Node ${{ matrix.node-version }})
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [20, 22]

    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm
          cache-dependency-path: agent-proxy/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: agent-proxy

      - name: Run tests
        run: npm test
        working-directory: agent-proxy

  # ── Deploy to Production (only on merge to main) ────────
  deploy:
    name: Deploy to Production
    needs: test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - uses: actions/checkout@v4

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VM_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          echo "${{ secrets.VM_HOST_KEY }}" >> ~/.ssh/known_hosts

      - name: Deploy via Docker Compose
        run: |
          ssh -i ~/.ssh/deploy_key benjijmac@34.55.255.155 << 'DEPLOY'
            set -euo pipefail
            cd ~/agentic-firewall

            # Pull latest code
            git pull origin main 2>/dev/null || true

            # Rebuild and restart containers
            docker compose up -d --build --remove-orphans

            # Wait for health check
            sleep 15

            # Verify
            curl -sf http://localhost:4000/api/stats > /dev/null || {
              echo "❌ Health check failed!"
              docker compose logs --tail=20 proxy
              exit 1
            }

            echo "✅ Production deployment verified"
          DEPLOY

      - name: Verify external endpoint
        run: |
          sleep 5
          curl -sf https://api.jockeyvc.com/api/stats > /dev/null
          echo "✅ External endpoint verified"

  # ── Publish CLI to npm (only on merge to main) ────────
  publish:
    name: Publish vibe-billing to npm
    needs: [test, deploy]
    runs-on: ubuntu-latest
    if: >-
      github.ref == 'refs/heads/main' &&
      github.event_name == 'push' &&
      !contains(github.event.head_commit.message, '[skip ci]')

    permissions:
      contents: write
      id-token: write

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Use Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Bump patch version
        working-directory: agent-cli
        run: |
          NEW_VERSION=$(npm version patch --no-git-tag-version)
          echo "NEW_VERSION=$NEW_VERSION" >> $GITHUB_ENV

      - name: Sync VERSION const in CLI
        working-directory: agent-cli
        run: |
          VER="${NEW_VERSION#v}"
          sed -i "s/^const VERSION = '.*';$/const VERSION = '${VER}';/" bin/cli.js

      - name: Commit version bump
        run: |
          git add agent-cli/package.json agent-cli/bin/cli.js
          git commit -m "chore: bump vibe-billing to $NEW_VERSION [skip ci]"
          git push

      - name: Publish to npm
        working-directory: agent-cli
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
